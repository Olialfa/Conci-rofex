<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Conciliación por Especie / Cantidad</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f8fafc; color: #1e293b; padding: 24px; }
    h2 { font-size: 22px; margin-bottom: 4px; }
    p.sub { color: #64748b; font-size: 13px; margin-bottom: 20px; }
    .files { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 20px; }
    .file-box { flex: 1; min-width: 220px; border: 2px dashed #cbd5e1; border-radius: 10px; padding: 16px; background: #fafafa; }
    .file-box.loaded-blue { border-color: #3b82f6; background: #eff6ff; }
    .file-box.loaded-green { border-color: #10b981; background: #f0fdf4; }
    .file-box label { display: inline-block; padding: 7px 18px; border-radius: 7px; color: #fff; font-weight: 600; font-size: 13px; cursor: pointer; }
    .file-box input[type=file] { display: none; }
    .file-name { margin-top: 6px; font-size: 12px; font-weight: 500; }
    .btn { border: none; border-radius: 8px; padding: 10px 28px; font-weight: 700; font-size: 14px; cursor: pointer; color: #fff; }
    .btn:disabled { background: #94a3b8 !important; cursor: not-allowed; }
    .btn-blue { background: #3b82f6; }
    .btn-green { background: #10b981; }
    .actions { display: flex; gap: 10px; margin-bottom: 20px; }
    .error { background: #fee2e2; border: 1px solid #fca5a5; border-radius: 8px; padding: 14px; color: #991b1b; margin-bottom: 16px; }
    .stats { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 20px; }
    .stat { border-radius: 10px; padding: 10px 16px; font-weight: 700; text-align: center; min-width: 85px; }
    .stat .val { font-size: 22px; }
    .stat .lbl { font-size: 11px; font-weight: 500; }
    .tabs { display: flex; gap: 4px; border-bottom: 2px solid #e2e8f0; margin-bottom: 16px; flex-wrap: wrap; }
    .tab { padding: 8px 14px; border: none; background: transparent; color: #64748b; border-radius: 6px 6px 0 0; font-weight: 600; cursor: pointer; font-size: 12px; }
    .tab.active { background: #3b82f6; color: #fff; }
    .empty { color: #64748b; padding: 16px; text-align: center; }
    table { width: 100%; border-collapse: collapse; }
    th { padding: 7px 12px; text-align: left; font-size: 12px; white-space: nowrap; border-bottom: 1px solid #e2e8f0; }
    td { padding: 6px 12px; font-size: 13px; border-bottom: 1px solid #f1f5f9; }
    tr:nth-child(even) td { background: #f8fafc; }
    .hidden { display: none; }
  </style>
</head>
<body>

<h2>Conciliación por Especie / Cantidad</h2>
<p class="sub">Compara cantidades por código entre dos archivos. Agrupa si el código se repite.</p>

<div class="files">
  <div class="file-box" id="boxA">
    <div style="font-weight:700;font-size:14px;margin-bottom:6px">📋 Archivo A (ACTIVO CÓD.)</div>
    <label style="background:#3b82f6">Seleccionar<input type="file" id="fileA" accept=".xlsx,.xls,.csv"></label>
    <div class="file-name" id="nameA" style="color:#3b82f6"></div>
  </div>
  <div class="file-box" id="boxB">
    <div style="font-weight:700;font-size:14px;margin-bottom:6px">📋 Archivo B (ESPECIE CODIGO)</div>
    <label style="background:#10b981">Seleccionar<input type="file" id="fileB" accept=".xlsx,.xls,.csv"></label>
    <div class="file-name" id="nameB" style="color:#10b981"></div>
  </div>
</div>

<div class="actions">
  <button class="btn btn-blue" id="btnConc" disabled onclick="conciliar()">⚡ Conciliar</button>
  <button class="btn btn-green hidden" id="btnExp" onclick="exportar()">📊 Exportar CSV</button>
</div>

<div class="error hidden" id="errorBox"></div>
<div id="results" class="hidden">
  <div class="stats" id="stats"></div>
  <div class="tabs" id="tabs"></div>
  <div id="tableContainer"></div>
</div>

<script>
  let rowsA = null, rowsB = null, resultado = null;

  function normStr(s) {
    return String(s||"").toLowerCase().replace(/\s+/g," ").trim();
  }
  function toNum(v) {
    if (v==null||v==="") return NaN;
    return parseFloat(String(v).replace(/\./g,"").replace(",",".").replace(/[^\d.+-]/g,""));
  }
  function findCol(row, cands) {
    const keys = Object.keys(row);
    for (const c of cands) {
      const f = keys.find(k => normStr(k).includes(normStr(c)));
      if (f) return f;
    }
    return null;
  }
  function fmt(n) {
    if (isNaN(n)) return "—";
    return n.toLocaleString("es-AR", {minimumFractionDigits:2, maximumFractionDigits:6});
  }

  function parseFile(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const wb = XLSX.read(e.target.result, { type:"binary" });
          const ws = wb.Sheets[wb.SheetNames[0]];
          resolve(XLSX.utils.sheet_to_json(ws, { defval:"" }));
        } catch(err) { reject(err); }
      };
      reader.onerror = reject;
      reader.readAsBinaryString(file);
    });
  }

  document.getElementById("fileA").addEventListener("change", async (e) => {
    const f = e.target.files[0]; if (!f) return;
    rowsA = await parseFile(f);
    document.getElementById("nameA").textContent = "📄 " + f.name;
    document.getElementById("boxA").className = "file-box loaded-blue";
    checkReady();
  });

  document.getElementById("fileB").addEventListener("change", async (e) => {
    const f = e.target.files[0]; if (!f) return;
    rowsB = await parseFile(f);
    document.getElementById("nameB").textContent = "📄 " + f.name;
    document.getElementById("boxB").className = "file-box loaded-green";
    checkReady();
  });

  function checkReady() {
    document.getElementById("btnConc").disabled = !(rowsA && rowsB);
  }

  function conciliar() {
    const s0 = rowsA[0]||{}, c0 = rowsB[0]||{};
    const codColA = findCol(s0, ["activo cód","activo cod","activo_cod","activo","cód","cod"]);
    const canColA = findCol(s0, ["cantidad","cant","qty","tenencia"]);
    const codColB = findCol(c0, ["especie codigo","especie_codigo","especie","codigo","cod"]);
    const canColB = findCol(c0, ["cantidad","cant","qty","tenencia"]);

    const errs = [];
    if (!codColA) errs.push("Código en Archivo A (cols: "+Object.keys(s0).join(", ")+")");
    if (!canColA) errs.push("Cantidad en Archivo A");
    if (!codColB) errs.push("Código en Archivo B (cols: "+Object.keys(c0).join(", ")+")");
    if (!canColB) errs.push("Cantidad en Archivo B");

    const errBox = document.getElementById("errorBox");
    if (errs.length) {
      errBox.textContent = "⚠️ No encontré: " + errs.join(" | ");
      errBox.classList.remove("hidden");
      document.getElementById("results").classList.add("hidden");
      return;
    }
    errBox.classList.add("hidden");

    function groupByCod(rows, codCol, canCol) {
      const map = {};
      rows.forEach(r => {
        const cod = String(r[codCol]||"").trim();
        const can = toNum(r[canCol]);
        if (!cod) return;
        if (!map[cod]) map[cod] = { cod, total:0, filas:0 };
        map[cod].total += isNaN(can) ? 0 : can;
        map[cod].filas++;
      });
      return map;
    }

    const grupoA = groupByCod(rowsA, codColA, canColA);
    const grupoB = groupByCod(rowsB, codColB, canColB);
    const allCods = new Set([...Object.keys(grupoA), ...Object.keys(grupoB)]);

    const conciliadas=[], diferencias=[], soloEnA=[], soloEnB=[];
    for (const cod of allCods) {
      const a = grupoA[cod], b = grupoB[cod];
      if (a && b) {
        if (a.total === b.total) conciliadas.push({cod, cantA:a.total, cantB:b.total, filasA:a.filas, filasB:b.filas});
        else diferencias.push({cod, cantA:a.total, cantB:b.total, dif:a.total-b.total, filasA:a.filas, filasB:b.filas});
      } else if (a) soloEnA.push({cod, cantA:a.total, filasA:a.filas});
      else soloEnB.push({cod, cantB:b.total, filasB:b.filas});
    }

    resultado = { conciliadas, diferencias, soloEnA, soloEnB,
                  totalA:Object.keys(grupoA).length, totalB:Object.keys(grupoB).length };

    renderStats();
    renderTabs("conc");
    document.getElementById("results").classList.remove("hidden");
    document.getElementById("btnExp").classList.remove("hidden");
  }

  function renderStats() {
    const r = resultado;
    const items = [
      {lbl:"Conciliadas",  val:r.conciliadas.length, bg:"#d1fae5",tc:"#065f46"},
      {lbl:"Diferencias",  val:r.diferencias.length, bg:"#fee2e2",tc:"#991b1b"},
      {lbl:"Solo en A",    val:r.soloEnA.length,     bg:"#dbeafe",tc:"#1e40af"},
      {lbl:"Solo en B",    val:r.soloEnB.length,     bg:"#d1fae5",tc:"#065f46"},
      {lbl:"Especies A",   val:r.totalA,             bg:"#f1f5f9",tc:"#475569"},
      {lbl:"Especies B",   val:r.totalB,             bg:"#f1f5f9",tc:"#475569"},
    ];
    document.getElementById("stats").innerHTML = items.map(s=>
      `<div class="stat" style="background:${s.bg};color:${s.tc}">
        <div class="val">${s.val}</div><div class="lbl">${s.lbl}</div>
      </div>`
    ).join("");
  }

  let currentTab = "conc";
  function renderTabs(active) {
    currentTab = active;
    const r = resultado;
    const tabs = [
      {id:"conc", label:`✅ Conciliadas (${r.conciliadas.length})`},
      {id:"dif",  label:`⚠️ Diferencias (${r.diferencias.length})`},
      {id:"solA", label:`🔵 Solo en A (${r.soloEnA.length})`},
      {id:"solB", label:`🟢 Solo en B (${r.soloEnB.length})`},
    ];
    document.getElementById("tabs").innerHTML = tabs.map(t=>
      `<button class="tab ${t.id===active?'active':''}" onclick="renderTabs('${t.id}')">${t.label}</button>`
    ).join("");
    renderTable(active);
  }

  function renderTable(tab) {
    const r = resultado;
    const container = document.getElementById("tableContainer");
    let rows, cols, bgH;

    if (tab==="conc") {
      rows=r.conciliadas; bgH="#d1fae5";
      cols=[{k:"cod",l:"Código"},{k:"cantA",l:"Cantidad A",f:fmt},{k:"cantB",l:"Cantidad B",f:fmt},{k:"filasA",l:"Filas A"},{k:"filasB",l:"Filas B"}];
    } else if (tab==="dif") {
      rows=r.diferencias; bgH="#fee2e2";
      cols=[{k:"cod",l:"Código"},{k:"cantA",l:"Cantidad A",f:fmt},{k:"cantB",l:"Cantidad B",f:fmt},{k:"dif",l:"Diferencia",f:(v)=>`<span style="color:${v>0?'#1d4ed8':v<0?'#dc2626':'#16a34a'};font-weight:600">${fmt(v)}</span>`},{k:"filasA",l:"Filas A"},{k:"filasB",l:"Filas B"}];
    } else if (tab==="solA") {
      rows=r.soloEnA; bgH="#dbeafe";
      cols=[{k:"cod",l:"Código"},{k:"cantA",l:"Cantidad A",f:fmt},{k:"filasA",l:"Filas A"}];
    } else {
      rows=r.soloEnB; bgH="#d1fae5";
      cols=[{k:"cod",l:"Código"},{k:"cantB",l:"Cantidad B",f:fmt},{k:"filasB",l:"Filas B"}];
    }

    if (!rows.length) { container.innerHTML=`<div class="empty">Sin registros.</div>`; return; }

    const thead = `<thead><tr style="background:${bgH}">${cols.map(c=>`<th>${c.l}</th>`).join("")}</tr></thead>`;
    const tbody = `<tbody>${rows.map((row,i)=>
      `<tr>${cols.map(c=>`<td>${c.f ? c.f(row[c.k],row) : (row[c.k]??'')}</td>`).join("")}</tr>`
    ).join("")}</tbody>`;
    container.innerHTML = `<div style="overflow-x:auto"><table>${thead}${tbody}</table></div>`;
  }

  function toCSV(rows) {
    if (!rows.length) return "";
    const keys = Object.keys(rows[0]);
    const esc = v => `"${String(v).replace(/"/g,'""')}"`;
    return [keys.map(esc).join(","), ...rows.map(r=>keys.map(k=>esc(r[k]??'')).join(","))].join("\n");
  }

  function download(content, name) {
    const blob = new Blob(["\uFEFF"+content], {type:"text/csv;charset=utf-8;"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a"); a.href=url; a.download=name; a.click();
    URL.revokeObjectURL(url);
  }

  function exportar() {
    const r = resultado;
    const todo = [
      ...r.conciliadas.map(x=>({Codigo:x.cod, Cantidad_A:x.cantA, Cantidad_B:x.cantB, Filas_A:x.filasA, Filas_B:x.filasB, Estado:"Conciliado"})),
      ...r.diferencias.map(x=>({Codigo:x.cod, Cantidad_A:x.cantA, Cantidad_B:x.cantB, Diferencia:x.dif, Filas_A:x.filasA, Filas_B:x.filasB, Estado:"Diferencia"})),
      ...r.soloEnA.map(x=>({Codigo:x.cod, Cantidad_A:x.cantA, Filas_A:x.filasA, Estado:"Solo en A"})),
      ...r.soloEnB.map(x=>({Codigo:x.cod, Cantidad_B:x.cantB, Filas_B:x.filasB, Estado:"Solo en B"})),
    ];
    download(toCSV(todo), "conciliacion_especies.csv");
  }
</script>
</body>
</html>
